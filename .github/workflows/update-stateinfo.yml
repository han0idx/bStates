name: Update stateinfo.json

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: update-stateinfo-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-stateinfo:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip stateinfo]') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect changed files from the push
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER")"
          else
            FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          fi
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Normalize chunks and regenerate stateinfo.json
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: python scripts/update_stateinfo.py

      - name: Commit changes if any
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nothing changed; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update stateinfo.json [skip stateinfo]"
          git push
